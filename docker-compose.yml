services:
  identity-service:
    build:
      context: .
      dockerfile: backend/identity-service/Dockerfile.dev
    ports:
      - "${IDENTITY_SERVICE_PORT}:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - backend/identity-service/.env
    depends_on:
      identity-db:
        condition: service_healthy

  identity-service-test:
    image: identity-platform-identity-service
    ports:
      - "${IDENTITY_SERVICE_TEST_PORT}:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - backend/identity-service/.env.test
    depends_on:
      identity-db-test:
        condition: service_healthy

  identity-db:
    image: postgres:17-alpine
    ports:
      - "${IDENTITY_DB_PORT}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: identity
    volumes:
      - identity-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  identity-db-test:
    image: postgres:17-alpine
    ports:
      - "${IDENTITY_DB_TEST_PORT}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: identity_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  notification-service:
    build:
      context: .
      dockerfile: backend/notification-service/Dockerfile.dev
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - backend/notification-service/.env
    depends_on:
      - rabbitmq

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_UI_PORT}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: rabbitmq
      RABBITMQ_DEFAULT_PASS: rabbitmq
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    ports:
      - "${MAIL_SMTP_PORT}:1025"
      - "${MAIL_UI_PORT}:8025"

volumes:
  identity-db-data:
  rabbitmq-data: