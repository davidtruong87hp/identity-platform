services:
  identity-service:
    build:
      context: .
      dockerfile: backend/identity-service/Dockerfile.dev
    ports:
      - "${IDENTITY_SERVICE_PORT}:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - backend/identity-service/.env
    depends_on:
      identity-db:
        condition: service_healthy

  identity-service-test:
    image: identity-platform-identity-service
    ports:
      - "${IDENTITY_SERVICE_TEST_PORT}:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - backend/identity-service/.env.test
    depends_on:
      identity-db-test:
        condition: service_healthy

  identity-db:
    image: postgres:17-alpine
    ports:
      - "${IDENTITY_DB_PORT}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: identity
    volumes:
      - identity-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  identity-db-test:
    image: postgres:17-alpine
    ports:
      - "${IDENTITY_DB_TEST_PORT}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: identity_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  notification-service:
    build:
      context: .
      dockerfile: backend/notification-service/Dockerfile.dev
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - backend/notification-service/.env
    depends_on:
      - rabbitmq

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_UI_PORT}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: rabbitmq
      RABBITMQ_DEFAULT_PASS: rabbitmq
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    ports:
      - "${MAIL_SMTP_PORT}:1025"
      - "${MAIL_UI_PORT}:8025"

  minio:
    image: minio/minio
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_UI_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/${MINIO_BUCKET};
      mc anonymous set public local/${MINIO_BUCKET};
      echo 'MinIO bucket created successfully';
      "
  web:
    build:
      context: .
      dockerfile: frontend/web/Dockerfile.dev
    ports:
      - "${WEB_PORT}:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - frontend/web/.env.local
    depends_on:
      - identity-service

volumes:
  identity-db-data:
  rabbitmq-data:
  minio-data: